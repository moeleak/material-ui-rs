name: Release showcase binaries

on:
  push:
    tags:
      - "0.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        default: "0.3.0"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  CARGO_PROFILE_RELEASE_LTO: fat
  CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
  CARGO_PROFILE_RELEASE_OVERFLOW_CHECKS: "false"
  CARGO_PROFILE_RELEASE_PANIC: abort
  CARGO_PROFILE_RELEASE_STRIP: symbols

jobs:
  build:
    name: Build ${{ matrix.os_name }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: linux
            arch: x86_64
            runner: ubuntu-latest
            binary: target/release/examples/showcase
            asset_ext: ""
          - os_name: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            binary: target/release/examples/showcase
            asset_ext: ""
          - os_name: windows
            arch: x86_64
            runner: windows-latest
            binary: target/release/examples/showcase.exe
            asset_ext: ".exe"
          - os_name: windows
            arch: aarch64
            runner: windows-11-arm
            binary: target/release/examples/showcase.exe
            asset_ext: ".exe"
          - os_name: macos
            arch: x86_64
            runner: macos-26-intel
            binary: target/release/examples/showcase
            asset_ext: ""
          - os_name: macos
            arch: aarch64
            runner: macos-26
            binary: target/release/examples/showcase
            asset_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-showcase-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'Cargo.toml.orig', '.github/workflows/release-showcase.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-showcase-

      - name: Build showcase
        shell: bash
        run: cargo build --release --locked --example showcase

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          asset="dist/material-ui-rs-showcase-${short_sha}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.asset_ext }}"

          mkdir -p dist
          cp "${{ matrix.binary }}" "${asset}"

          if [[ "${{ matrix.os_name }}" != "windows" ]]; then
            chmod +x "${asset}"
          fi

          echo "path=${asset}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: showcase-${{ matrix.os_name }}-${{ matrix.arch }}
          path: ${{ steps.asset.outputs.path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download binaries
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          material-ui-rs ${TAG} is published on crates.io.

          Crate package: material-ui-rs
          Rust crate name: material_ui_rs

          This release includes optimized showcase binaries for Linux, macOS, and Windows.
          EOF

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --notes-file release-notes.md
            gh release upload "${TAG}" release-assets/* --clobber
          else
            gh release create "${TAG}" release-assets/* \
              --verify-tag \
              --title "${TAG}" \
              --notes-file release-notes.md
          fi
