[dependencies.iced_widget]
version = "0.14"
features = ["canvas"]

[dependencies.iced_winit]
version = "0.14"

[dependencies.num-traits]
version = "0.2"

[target.'cfg(target_arch = "wasm32")'.dependencies.js-sys]
version = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies.wasm-bindgen]
