[[example]]
name = "showcase"
path = "examples/showcase/app.rs"

[[bin]]
name = "showcase_web"
path = "web/showcase_web.rs"
required-features = ["__showcase_web"]

[profile.release]
lto = "fat"
opt-level = "z"
codegen-units = 1
strip = true
panic = "abort"

[dependencies.iced_anim]
version = "0.3"
features = ["derive"]
optional = true

[dependencies.iced_dialog]
version = "0.14"
optional = true

[dependencies.iced]
version = "0.14"

[dependencies.iced_selection]
version = "0.5"
