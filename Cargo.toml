[package]
edition = "2024"
rust-version = "1.88"
name = "material-ui-rs"
version = "0.4.0"
authors = [
    "pml68 <contact@pml68.dev>",
    "MoeLeak <i@leak.moe>",
]
build = false
exclude = [
    "assets/*",
    "Cargo.toml.orig",
    ".cargo/config.toml",
    ".build.yml",
    "rustfmt.toml",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Material3 inspired theme for `iced`"
readme = "README.md"
keywords = [
    "gui",
    "ui",
    "graphics",
    "interface",
    "widgets",
]
categories = ["gui"]
license = "MIT"
repository = "https://github.com/moeleak/material-ui-rs"

[features]
animate = ["dep:iced_anim"]
crisp = ["iced_widget/crisp"]
default = ["svg", "animate"]
dialog = ["dep:iced_dialog"]
markdown = ["iced_widget/markdown"]
qr_code = ["iced_widget/qr_code"]
selection = ["dep:iced_selection"]
serde = ["serde/derive"]
svg = ["iced_widget/svg"]
__showcase_web = []

[lib]
name = "material_ui_rs"
